experiment:
  name: default_run
  seed: 42
  output_root: outputs
  device: cpu

data:
  name: toy_airfoil
  dataset_type: synthetic
  dataset_path: outputs/data/toy_airfoil_dataset.npz
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  num_samples: 160
  num_query_points: 192
  num_surface_points: 96
  mach_range: [0.2, 0.78]
  aoa_range: [-2.0, 8.0]
  normalization:
    branch: standard
    coordinates: standard
    fields: standard
    scalars: standard
  include_reynolds: false
  branch_feature_mode: params
  low_fidelity_enabled: false

model:
  name: deeponet
  branch_input_dim: 6
  trunk_input_dim: 2
  field_output_dim: 4
  scalar_output_dim: 2
  hidden_dim: 128
  latent_dim: 128
  branch_layers: 3
  trunk_layers: 3
  activation: gelu
  dropout: 0.0
  use_fourier_features: true
  fourier_features_dim: 32
  scalar_head_hidden_dim: 64

train:
  epochs: 20
  batch_size: 8
  learning_rate: 0.001
  weight_decay: 1.0e-6
  optimizer: adam
  scheduler:
    name: cosine
    t_max: 20
    min_lr: 1.0e-5
  mixed_precision: false
  grad_clip_norm: 1.0
  log_every_n_steps: 10
  checkpoint_every_n_epochs: 1
  early_stopping_patience: 10
  resume_from: null

loss:
  field_weight: 1.0
  surface_weight: 0.5
  scalar_weight: 0.5
  physics_weight: 0.1
  boundary_weight: 0.0
  field_loss_type: mse
  scalar_loss_type: mse
  use_physics: true
  use_energy_residual: false

eval:
  batch_size: 8
  num_visualization_samples: 3
  save_plots: true
  metrics_path: outputs/eval/metrics.json
  report_path: outputs/eval/report.md

serve:
  host: 127.0.0.1
  port: 8000
  checkpoint_path: outputs/default_run/checkpoints/best.pt

